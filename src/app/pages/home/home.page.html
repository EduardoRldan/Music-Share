<ion-app>
  <!-- Menu -->
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar color="tertiary">
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/explore" routerDirection="root">
            <ion-icon name="search" slot="start"></ion-icon>
            <ion-label>Explore</ion-label>
          </ion-item>
          <ion-item routerLink="/home" routerDirection="root">
            <ion-icon name="home" slot="start"></ion-icon>
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item routerLink="/login" routerDirection="root">
            <ion-icon name="log-in" slot="start"></ion-icon>
            <ion-label>Login</ion-label>
          </ion-item>
          <ion-item routerLink="/my-music" routerDirection="root">
            <ion-icon name="musical-notes" slot="start"></ion-icon>
            <ion-label>My Music</ion-label>
          </ion-item>
          <ion-item routerLink="/profile" routerDirection="root">
            <ion-icon name="person" slot="start"></ion-icon>
            <ion-label>Profile</ion-label>
          </ion-item>
          <ion-item routerLink="/register" routerDirection="root">
            <ion-icon name="person-add" slot="start"></ion-icon>
            <ion-label>Register</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- Main Content -->
  <div class="ion-page" id="main-content">
    <!-- Home Header -->
    <ion-header [translucent]="true">
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>Home</ion-title>
      </ion-toolbar>
    </ion-header>

    <!-- Collapsed Header -->
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-title size="large">Home</ion-title>
      </ion-toolbar>
    </ion-header>

    <!-- Login Form -->
    <ion-content [fullscreen]="true" class="ion-padding">
      <form (ngSubmit)="onLogin()">
        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input type="email" [(ngModel)]="email" name="email"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">Password</ion-label>
          <ion-input type="password" [(ngModel)]="password" name="password"></ion-input>
        </ion-item>
        <ion-button expand="full" type="submit">Login</ion-button>
      </form>
      <ion-button expand="full" routerLink="/register">Register</ion-button>
    </ion-content>
  </div>
</ion-app>
