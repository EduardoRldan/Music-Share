<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar color="tertiary">
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <ion-list>
        <ion-item routerLink="/home">
          <ion-icon slot="start" name="home-outline"></ion-icon>
          <ion-label>Home</ion-label>
        </ion-item>
        <ion-item routerLink="/explore">
          <ion-icon slot="start" name="compass-outline"></ion-icon>
          <ion-label>Explore</ion-label>
        </ion-item>
        <ion-item routerLink="/login">
          <ion-icon slot="start" name="log-in-outline"></ion-icon>
          <ion-label>Login</ion-label>
        </ion-item>
        <ion-item routerLink="/my-music">
          <ion-icon slot="start" name="musical-notes-outline"></ion-icon>
          <ion-label>My Music</ion-label>
        </ion-item>
        <ion-item routerLink="/register">
          <ion-icon slot="start" name="person-add-outline"></ion-icon>
          <ion-label>Register</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <div class="ion-page" id="main-content">
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title size="large">Profile</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <!-- Aquí puedes añadir el contenido de la página Profile -->
    </ion-content>
  </div>
</ion-content>
