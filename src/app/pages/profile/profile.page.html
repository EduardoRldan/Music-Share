<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Profile</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- Profile Content -->
  <ion-card>
    <ion-item>
      <ion-avatar slot="start">
        <img src="assets/img/avatar.png" />
      </ion-avatar>
      <ion-label>
        <h2>{{ userProfile.name }}</h2>
        <p>{{ userProfile.email }}</p>
      </ion-label>
    </ion-item>
  </ion-card>
  
  <ion-list>
    <ion-item>
      <ion-label>Username</ion-label>
      <ion-input [(ngModel)]="userProfile.username" placeholder="Enter your username"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label>Bio</ion-label>
      <ion-textarea [(ngModel)]="userProfile.bio" placeholder="Tell us about yourself"></ion-textarea>
    </ion-item>
    <ion-item>
      <ion-label>Location</ion-label>
      <ion-input [(ngModel)]="userProfile.location" placeholder="Enter your location"></ion-input>
    </ion-item>
  </ion-list>
  
  <ion-button expand="full" (click)="saveProfile()">Save Profile</ion-button>
</ion-content>
